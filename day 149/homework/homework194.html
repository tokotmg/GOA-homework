<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinimalShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="header-container">
            <h1 class="logo" onclick="showView('home')">MinimalShop</h1>
            <nav id="nav-links">
                <!-- Dynamic links injected by JS -->
            </nav>
        </div>
    </header>

    <main class="container">
        
        <!-- Register Page -->
        <section id="register-view" class="view hidden">
            <div class="auth-card">
                <h2>Create Account</h2>
                <form id="register-form">
                    <input type="text" id="reg-username" placeholder="Username" required>
                    <input type="password" id="reg-password" placeholder="Password" required>
                    <button type="submit" class="btn">Register</button>
                </form>
                <p>Already have an account? <a href="#" onclick="showView('login')">Login here</a></p>
            </div>
        </section>

        <!-- Login Page -->
        <section id="login-view" class="view hidden">
            <div class="auth-card">
                <h2>Welcome Back</h2>
                <form id="login-form">
                    <input type="text" id="login-username" placeholder="Username" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit" class="btn">Login</button>
                </form>
                <p>New customer? <a href="#" onclick="showView('register')">Create an account</a></p>
            </div>
        </section>

        <!-- Home Page (Product Grid) -->
        <section id="home-view" class="view">
            <h2 class="section-title">Our Products</h2>
            <div id="product-grid" class="grid">
                <!-- Products injected by JS -->
            </div>
        </section>

        <!-- Product Details Page -->
        <section id="details-view" class="view hidden">
            <div id="product-details" class="details-container">
                <!-- Single product details injected by JS -->
            </div>
        </section>

        <!-- Cart Page -->
        <section id="cart-view" class="view hidden">
            <h2 class="section-title">Your Shopping Cart</h2>
            <div class="cart-container">
                <div id="cart-items-list">
                    <!-- Cart items injected by JS -->
                </div>
                <div id="cart-summary" class="cart-summary hidden">
                    <h3>Order Summary</h3>
                    <div class="summary-row"><span>Total:</span><span id="cart-total">$0.00</span></div>
                    <button class="btn checkout-btn" onclick="checkout()">Proceed to Checkout</button>
                </div>
            </div>
        </section>

    </main>

    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script src="cart.js"></script>
</body>
</html>
