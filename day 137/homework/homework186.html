<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Registration Page -->
    <div id="register-page" class="page active">
        <div class="card">
            <h2>Create Account</h2>
            <form id="register-form">
                <div class="input-group">
                    <label for="reg-name">Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe" required>
                    <small class="error-msg"></small>
                </div>
                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="example@email.com" required>
                    <small class="error-msg"></small>
                </div>
                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="At least 6 characters" required>
                    <small class="error-msg"></small>
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
            <p class="toggle-text">Already have an account? <a href="#" id="show-login">Log in</a></p>
        </div>
    </div>

    <!-- Login Page -->
    <div id="login-page" class="page">
        <div class="card">
            <h2>Welcome Back</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="example@email.com" required>
                    <small class="error-msg"></small>
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                    <small class="error-msg"></small>
                </div>
                <button type="submit" class="btn">Log In</button>
            </form>
            <p class="toggle-text">Need an account? <a href="#" id="show-register">Sign up</a></p>
        </div>
    </div>

    <!-- Home Page -->
    <div id="home-page" class="page">
        <div class="card home-card">
            <h2>Dashboard</h2>
            <p>Welcome to your secure dashboard! What would you like to do today?</p>
            <div class="home-actions">
                <button id="logout-btn" class="btn">Log Out</button>
                <button id="delete-btn" class="btn btn-danger">Delete Account</button>
            </div>
            
            <!-- Delete Confirmation Form (hidden by default) -->
            <form id="delete-confirm-form" class="hidden">
                <h3>Confirm Deletion</h3>
                <div class="input-group">
                    <label for="delete-email">Confirm Email</label>
                    <input type="email" id="delete-email" required>
                </div>
                <div class="input-group">
                    <label for="delete-password">Confirm Password</label>
                    <input type="password" id="delete-password" required>
                </div>
                <small id="delete-error" class="error-msg"></small>
                <div class="home-actions">
                    <button type="submit" class="btn btn-danger">Permanently Delete</button>
                    <button type="button" id="cancel-delete-btn" class="btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
