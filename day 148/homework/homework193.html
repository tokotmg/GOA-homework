<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist FakeStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="logo" onclick="navigateTo('home')">🛍️ FakeStore</div>
        <nav id="nav-auth-controls"></nav>
    </header>
    <main id="main-content" class="container"></main>
    <div id="templates" style="display: none;">
        <div id="view-login" class="auth-card">
            <h2>Welcome Back</h2>
            <form onsubmit="handleLogin(event)">
                <input type="text" id="login-user" placeholder="Username" required>
                <input type="password" id="login-pass" placeholder="Password" required>
                <button type="submit" class="btn btn-primary">Log In</button>
            </form>
            <p>Don't have an account? <span class="link" onclick="navigateTo('register')">Register</span></p>
        </div>
        <div id="view-register" class="auth-card">
            <h2>Create Account</h2>
            <form onsubmit="handleRegister(event)">
                <input type="text" id="reg-user" placeholder="Username" required>
                <input type="email" id="reg-email" placeholder="Email Address" required>
                <input type="password" id="reg-pass" placeholder="Password" required>
                <button type="submit" class="btn btn-primary">Register</button>
            </form>
            <p>Already have an account? <span class="link" onclick="navigateTo('login')">Log In</span></p>
        </div>
        <div id="view-home">
            <h1 class="page-title">Explore Our Products</h1>
            <div id="products-grid" class="products-grid">Loading products...</div>
        </div>
        <div id="view-detail" class="detail-container">
            <button class="btn btn-secondary" onclick="navigateTo('home')">← Back to Products</button>
            <div id="product-detail-content" class="detail-layout"></div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
