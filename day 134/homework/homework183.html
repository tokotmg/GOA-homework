<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="textInput">Enter your text:</label><br>
        <input type="text" id="textInput" oninput="checkCharacters()" placeholder="Type here...">
        <span id="charFeedback">8 letters left!</span>
    </form>
    <div class="container">
    <input type="text" id="userInput" placeholder="Type something...">
    <button onclick="saveData()">Save</button>
    <div class="display-area">
        <strong>Stored Data:</strong>
        <p id="output">No data saved.</p>
        <button id="deleteBtn" class="delete-btn" onclick="clearData()" style="display: none;">Delete Data</button>
    </div>
</div>
    <script src="index (2).js"></script>
</body>
</html>
