<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Project</title>
    <style>
        .view { display: none; }
        .active { display: block; }
    </style>
</head>
<body>
    <div id="registerView" class="view active">
        <h2>Create an Account</h2>
        <form id="registerForm">
            <label for="regEmail">Email:</label><br>
            <input type="email" id="regEmail" required><br><br>
            <label for="regPassword">Password:</label><br>
            <input type="password" id="regPassword" required><br><br>
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="#" id="toLogin">Login here</a></p>
    </div>
    <div id="loginView" class="view">
        <h2>Login</h2>
        <form id="loginForm">
            <label for="loginEmail">Email:</label><br>
            <input type="email" id="loginEmail" required><br><br>
            <label for="loginPassword">Password:</label><br>
            <input type="password" id="loginPassword" required><br><br>
            <button type="submit">Login</button>
        </form>
        <p>Need an account? <a href="#" id="toRegister">Register here</a></p>
    </div>
    <div id="dashboardView" class="view">
        <h2>Welcome to the Project!</h2>
        <p>You are logged in as: <span id="userDisplay"></span></p>
        <button id="logoutBtn">Logout</button>
    </div>
    <script src="index.js"></script>
</body>
</html>
